name: build-native-plugin

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify checked-in Android SDK inputs
        working-directory: android-sdkdemo
        shell: bash
        run: |
          set -eo pipefail
          test -f libBase/libs/NvAndroidStreamingSdk.jar
          test -f libBase/libs/nvconvertorlib.aar
          test -f libBase/libs/cafconvertor.aar
          test -f libBase/libs/extension-flac-release.aar
          test -f libBase/libs/libMeicamAI-3.8.1.1.aar
          test -f libBase/libs/library-core-release.aar
          test -f libBase/libs/library-ui-release.aar
          test -f app/src/main/assets/meishesdk.lic

      - name: Set up JDK 17 for Android SDK tools
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Android platform
        shell: bash
        run: |
          set -eo pipefail
          export ANDROID_SDK_ROOT="${ANDROID_SDK_ROOT:-${ANDROID_HOME:?ANDROID_HOME is required}}"
          echo "ANDROID_HOME=${ANDROID_HOME:-}"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          SDKMANAGER="$(find "$ANDROID_SDK_ROOT/cmdline-tools" -type f -path '*/bin/sdkmanager' -print -quit)"
          test -n "$SDKMANAGER"
          echo "sdkmanager=$SDKMANAGER"
          export PATH="$(dirname "$SDKMANAGER"):$ANDROID_SDK_ROOT/platform-tools:$PATH"
          yes | "$SDKMANAGER" --licenses >/dev/null || true
          "$SDKMANAGER" "platforms;android-33" "build-tools;33.0.3"

      - name: Set up JDK 11 for Gradle 6.5
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"

      - name: Build Android AARs
        working-directory: android-sdkdemo
        shell: bash
        run: |
          set -o pipefail
          printf 'sdk.dir=%s\n' "${ANDROID_SDK_ROOT:-$ANDROID_HOME}" > local.properties
          chmod +x gradlew
          mkdir -p build
          ./gradlew \
            --stacktrace \
            :app:assembleRelease \
            :libBase:assembleRelease \
            :libEngine:assembleRelease \
            :libNet:assembleRelease \
            :MArScene:assembleRelease \
            :MCutSame:assembleRelease \
            :MMakeup:assembleRelease 2>&1 | tee build/ci-gradle.log
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            echo "::error title=Android Gradle build failed::The matching lines below identify the compile failure."
            grep -a -E "FAILURE:|What went wrong:|\* Exception|(^| )error:|^e: |Caused by:" build/ci-gradle.log | tail -n 80 || true
            echo "::error title=Android Gradle build log tail::No matching compiler line may exist when Gradle exits before task execution; the final 200 log lines follow."
            tail -n 200 build/ci-gradle.log || true
            exit "$status"
          fi

      - name: Upload Android build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: osx-meishe-video-android-build-log
          path: android-sdkdemo/build/ci-gradle.log
          if-no-files-found: warn

      - name: Prepare Android plugin artifact
        run: |
          set -eo pipefail
          rm -rf _artifacts/android
          mkdir -p _artifacts/android/assets
          cp android-sdkdemo/app/build/outputs/aar/app-release.aar _artifacts/android/OSXMeisheVideo.aar
          cp android-sdkdemo/libBase/build/outputs/aar/libBase-release.aar _artifacts/android/
          cp android-sdkdemo/libEngine/build/outputs/aar/libEngine-release.aar _artifacts/android/
          cp android-sdkdemo/libNet/build/outputs/aar/libNet-release.aar _artifacts/android/
          cp android-sdkdemo/MArScene/build/outputs/aar/MArScene-release.aar _artifacts/android/
          cp android-sdkdemo/MCutSame/build/outputs/aar/MCutSame-release.aar _artifacts/android/
          cp android-sdkdemo/MMakeup/build/outputs/aar/MMakeup-release.aar _artifacts/android/
          cp android-sdkdemo/libBase/libs/*.aar _artifacts/android/
          # The Meishe Java API is a separate SDK JAR. libBase's compiled classes reference
          # it, so it must travel with the AAR set consumed by uni-app hosts.
          cp android-sdkdemo/libBase/libs/NvAndroidStreamingSdk.jar _artifacts/android/
          cp android-sdkdemo/app/src/main/assets/meishesdk.lic _artifacts/android/assets/
          find _artifacts/android -type f -print

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: osx-meishe-video-android
          path: _artifacts/android

  ios:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build iOS static library (device arm64)
        run: |
          set -o pipefail
          rm -rf build
          mkdir -p build
          xcodebuild build \
            -project OSXMeisheVideo.xcodeproj \
            -scheme OSXMeisheVideo \
            -configuration Release \
            -sdk iphoneos \
            -arch arm64 \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO \
            SKIP_INSTALL=NO \
            DEPLOYMENT_POSTPROCESSING=NO \
            STRIP_INSTALLED_PRODUCT=NO \
            GCC_SYMBOLS_PRIVATE_EXTERN=NO \
            DEAD_CODE_STRIPPING=NO \
            CONFIGURATION_BUILD_DIR="$PWD/build/device" \
            BUILT_PRODUCTS_DIR="$PWD/build/device" \
            2>&1 | tee build/xcodebuild.log
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            echo "::error title=iOS static library build failed::See xcodebuild.log artifact for the full compiler output."
            grep -E "(^| )error:|fatal error:|Undefined symbols" build/xcodebuild.log | tail -n 50 || true
            exit "$status"
          fi

      - name: Upload iOS build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: osx-meishe-video-ios-build-log
          path: build/xcodebuild.log
          if-no-files-found: warn

      - name: Verify iOS static library
        run: |
          set -eo pipefail
          artifact="build/device/libOSXMeisheVideo.a"
          test -f "$artifact"
          lipo -info "$artifact" | grep -q arm64
          nm -gU "$artifact" | grep -E "OSXMeisheVideoModule|wx_export_method" >/dev/null

      - name: Upload iOS static library
        uses: actions/upload-artifact@v4
        with:
          name: osx-meishe-video-ios
          path: build/device/libOSXMeisheVideo.a

  package:
    runs-on: ubuntu-latest
    needs:
      - android
      - ios
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Android artifact
        uses: actions/download-artifact@v4
        with:
          name: osx-meishe-video-android
          path: plugin/OSX-MeisheVideo/android

      - name: Download iOS static library
        uses: actions/download-artifact@v4
        with:
          name: osx-meishe-video-ios
          path: plugin/OSX-MeisheVideo/ios

      - name: Prepare iOS runtime frameworks and resources
        run: |
          set -eo pipefail
          mkdir -p plugin/OSX-MeisheVideo/ios/Frameworks
          # Flutter's production podspec ships exactly these three frameworks. Their arm64
          # binaries form a closed @rpath dependency set; do not mix old-plugin frameworks.
          cp -R ios/Frameworks/NvShortVideoCore.xcframework/ios-arm64/NvShortVideoCore.framework plugin/OSX-MeisheVideo/ios/Frameworks/
          cp -R ios/Frameworks/NvStreamingSdkCore.xcframework/ios-arm64/NvStreamingSdkCore.framework plugin/OSX-MeisheVideo/ios/Frameworks/
          cp -R ios/Frameworks/NvMSAICutter.xcframework/ios-arm64/NvMSAICutter.framework plugin/OSX-MeisheVideo/ios/Frameworks/
          cp -R ios/BundleResources plugin/OSX-MeisheVideo/ios/BundleResources

      - name: Assemble uni-app native plugin
        run: |
          set -eo pipefail
          rm -f plugin/OSX-MeisheVideo.zip
          cd plugin
          zip -r OSX-MeisheVideo.zip OSX-MeisheVideo

      - name: Upload final plugin archive
        uses: actions/upload-artifact@v4
        with:
          name: OSX-MeisheVideo-uniapp-nativeplugin
          path: plugin/OSX-MeisheVideo.zip
